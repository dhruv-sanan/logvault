version: "3.8"

# ──────────────────────────────────────────────────────────────────────────────
# Local development stack — no cloud accounts needed.
# Run:  docker-compose up --build
# UI:   http://localhost:3000
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Elasticsearch ────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node      # single node, no cluster formation needed
      - xpack.security.enabled=false    # no auth for local dev
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # keep memory usage reasonable
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Next.js App (Log Ingestor + Query UI) ────────────────────────────────────
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # Points to the elasticsearch service by its Docker network hostname
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      # No API key needed for local ES with security disabled
      - ELASTICSEARCH_API_KEY=
    depends_on:
      elasticsearch:
        condition: service_healthy   # wait until ES is healthy before starting app

volumes:
  esdata:
    driver: local
